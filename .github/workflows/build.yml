name: Compilar App Electron

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Compilar para ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Obtener código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar frontend y Electron
        run: npm run build

      - name: Empaquetar con electron-builder
        run: npx electron-builder --${{ matrix.os == 'windows-latest' && 'win' || 'mac' }} --publish never
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Subir artefactos a Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-packaged/*.exe
            dist-packaged/*.dmg
            dist-packaged/*.blockmap
            dist-packaged/*.zip
          draft: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
